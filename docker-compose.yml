services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18760:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_PATH=data/schedule.db
      - CORS_ORIGIN=http://115.191.43.252:18761
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://115.191.43.252:18760
    environment:
      - NEXT_PUBLIC_API_URL=http://115.191.43.252:18760
    ports:
      - "18761:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
